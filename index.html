<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-title" content="Reflection">
<link rel="manifest" href="data:application/json,{%22name%22:%22Reflection%22,%22short_name%22:%22Reflection%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0a%22,%22theme_color%22:%22%230a0a0a%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100'/><text y='.9em' font-size='90'>📝</text></svg>">
<title>Reflection</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #c9a87c;
    --accent-dim: rgba(201, 168, 124, 0.15);
    --danger: #e05555;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Lock Screen ── */
  #lockScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }

  #lockScreen h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  #lockScreen p {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .pin-input {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: all 0.2s;
  }

  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
  }

  .pin-dot.error {
    border-color: var(--danger);
    background: var(--danger);
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 12px;
  }

  .numpad button {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .numpad button:active {
    background: var(--surface2);
    transform: scale(0.95);
  }

  .numpad button.fn {
    border: none;
    background: transparent;
    font-size: 13px;
    color: var(--text-dim);
  }

  .numpad button.fn:active {
    color: var(--text);
  }

  /* ── Setup Screen ── */
  #setupScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
    max-width: 400px;
    margin: 0 auto;
  }

  #setupScreen h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  #setupScreen .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
    text-align: center;
    line-height: 1.5;
  }

  .setup-field {
    width: 100%;
    margin-bottom: 20px;
  }

  .setup-field label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .setup-field input {
    width: 100%;
    padding: 14px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .setup-field input:focus {
    border-color: var(--accent);
  }

  .setup-field input::placeholder {
    color: #555;
  }

  .setup-field .hint {
    font-size: 12px;
    color: #555;
    margin-top: 6px;
  }

  /* ── Buttons ── */
  .btn {
    padding: 14px 28px;
    border-radius: var(--radius);
    border: none;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    width: 100%;
  }

  .btn-primary:active {
    transform: scale(0.98);
    opacity: 0.9;
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    padding: 8px 16px;
  }

  /* ── Main App ── */
  #mainApp {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .app-header h2 {
    font-size: 18px;
    font-weight: 600;
  }

  .app-header .date {
    font-size: 13px;
    color: var(--text-dim);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .icon-btn:active {
    background: var(--surface2);
  }

  /* ── Pillars ── */
  .pillars {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .pillars-title {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .pillar-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pillar-tag {
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 13px;
    white-space: nowrap;
  }

  /* ── Input Area ── */
  .input-area {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .input-area textarea {
    flex: 1;
    min-height: 200px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 16px;
    line-height: 1.7;
    resize: none;
    outline: none;
    font-family: inherit;
  }

  .input-area textarea::placeholder {
    color: #444;
  }

  .input-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    padding-bottom: calc(16px + var(--safe-bottom));
  }

  .input-footer .btn {
    flex: 1;
  }

  .char-count {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    padding: 4px 0;
  }

  /* ── Processing State ── */
  .processing {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    flex: 1;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .processing p {
    color: var(--text-dim);
    font-size: 15px;
  }

  /* ── Preview ── */
  #previewArea {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 15px;
    line-height: 1.8;
    -webkit-overflow-scrolling: touch;
  }

  .preview-content h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 24px;
    margin-bottom: 8px;
  }

  .preview-content h2:first-child {
    margin-top: 0;
  }

  .preview-content p {
    margin-bottom: 12px;
    color: var(--text);
  }

  .preview-title {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .preview-title .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .preview-title .filename {
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
  }

  .preview-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    padding-bottom: calc(16px + var(--safe-bottom));
  }

  .preview-footer .btn { flex: 1; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ── Settings Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 80dvh;
    overflow-y: auto;
    padding: 24px 20px;
    padding-bottom: calc(24px + var(--safe-bottom));
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .modal .setup-field {
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .modal-actions .btn { flex: 1; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: calc(20px + var(--safe-top));
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--surface2);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s ease;
    border: 1px solid var(--border);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast.error {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* ── Utilities ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Lock Screen -->
<div id="lockScreen">
  <h1>Reflection</h1>
  <p>输入密码</p>
  <div class="pin-input">
    <div class="pin-dot" data-i="0"></div>
    <div class="pin-dot" data-i="1"></div>
    <div class="pin-dot" data-i="2"></div>
    <div class="pin-dot" data-i="3"></div>
  </div>
  <div class="numpad">
    <button onclick="pinPress('1')">1</button>
    <button onclick="pinPress('2')">2</button>
    <button onclick="pinPress('3')">3</button>
    <button onclick="pinPress('4')">4</button>
    <button onclick="pinPress('5')">5</button>
    <button onclick="pinPress('6')">6</button>
    <button onclick="pinPress('7')">7</button>
    <button onclick="pinPress('8')">8</button>
    <button onclick="pinPress('9')">9</button>
    <button class="fn" onclick="pinClear()">清除</button>
    <button onclick="pinPress('0')">0</button>
    <button class="fn" onclick="pinDelete()">删除</button>
  </div>
</div>

<!-- Setup Screen (first time) -->
<div id="setupScreen">
  <h1>设置</h1>
  <p class="subtitle">首次使用，需要设置密码和 API Key</p>
  <div class="setup-field">
    <label>设置 4 位数字密码</label>
    <input type="password" id="setupPin" inputmode="numeric" maxlength="4" placeholder="••••" pattern="[0-9]*">
  </div>
  <div class="setup-field">
    <label>Claude API Key</label>
    <input type="password" id="setupApiKey" placeholder="sk-ant-..." autocomplete="off">
    <div class="hint">存在浏览器本地，不会发送到任何服务器</div>
  </div>
  <button class="btn btn-primary" id="setupSubmit" onclick="completeSetup()">开始使用</button>
</div>

<!-- Main App -->
<div id="mainApp">
  <div class="app-header">
    <div>
      <h2>今日反思</h2>
      <div class="date" id="todayDate"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="showSettings()" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <div class="pillars">
    <div class="pillars-title">理想中的自己</div>
    <div class="pillar-tags">
      <span class="pillar-tag">更 fit、好看</span>
      <span class="pillar-tag">有在学习</span>
      <span class="pillar-tag">不焦虑</span>
      <span class="pillar-tag">找到想要的生活</span>
    </div>
  </div>

  <!-- Input State -->
  <div id="inputArea" class="input-area">
    <textarea id="journalInput" placeholder="今天发生了什么？有什么想法和感受？&#10;&#10;想到什么就说什么，AI 会帮你整理..."></textarea>
    <div class="char-count"><span id="charCount">0</span> 字</div>
  </div>

  <!-- Processing State -->
  <div id="processingArea" class="processing">
    <div class="spinner"></div>
    <p>AI 正在整理你的想法...</p>
  </div>

  <!-- Preview State -->
  <div id="previewArea">
    <div class="preview-title">
      <div class="label">文件名</div>
      <div class="filename" id="previewFilename"></div>
    </div>
    <div class="preview-content" id="previewContent"></div>
  </div>

  <!-- Footer: changes based on state -->
  <div id="inputFooter" class="input-footer">
    <button class="btn btn-primary" id="submitBtn" onclick="submitReflection()" disabled>
      整理并保存
    </button>
  </div>

  <div id="previewFooter" class="input-footer hidden">
    <button class="btn btn-secondary" onclick="backToEdit()">返回修改</button>
    <button class="btn btn-primary" onclick="saveToObsidian()">保存到 Obsidian</button>
  </div>

  <!-- Success State -->
  <div id="successArea" class="processing hidden">
    <div style="font-size:48px;margin-bottom:16px;">&#10003;</div>
    <p style="font-size:17px;color:var(--text);margin-bottom:8px;">已保存！</p>
    <p id="successFilename" style="color:var(--accent);font-size:14px;margin-bottom:24px;"></p>
    <button class="btn btn-ghost" onclick="resetAll()">写新的</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal-overlay" onclick="if(event.target===this)hideSettings()">
  <div class="modal">
    <h3>设置</h3>
    <div class="setup-field">
      <label>Claude API Key</label>
      <input type="password" id="settingsApiKey" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <div class="setup-field">
      <label>修改密码（留空则不修改）</label>
      <input type="password" id="settingsPin" inputmode="numeric" maxlength="4" placeholder="新的 4 位密码" pattern="[0-9]*">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let pinBuffer = '';
let currentMarkdown = '';
let currentFilename = '';
let currentTitle = '';

// ── Utilities ──
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2500);
}

function getToday() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function getTodayDisplay() {
  const d = new Date();
  const days = ['日', '一', '二', '三', '四', '五', '六'];
  return `${d.getMonth() + 1}月${d.getDate()}日，星期${days[d.getDay()]}`;
}

async function hashPin(pin) {
  // crypto.subtle is only available on HTTPS or localhost
  if (crypto.subtle) {
    const encoder = new TextEncoder();
    const data = encoder.encode(pin + '_reflection_salt');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  // Fallback for HTTP: simple hash (less secure, but this is a personal app)
  let h = 0;
  const str = pin + '_reflection_salt';
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return 'fallback_' + Math.abs(h).toString(16);
}

// ── PIN Lock ──
function initApp() {
  const stored = localStorage.getItem('reflection_pin_hash');
  if (!stored) {
    // First time - show setup
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
  }
  // Otherwise show lock screen (default)
}

async function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;

  // Update dots
  document.querySelectorAll('.pin-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', i < pinBuffer.length);
  });

  if (pinBuffer.length === 4) {
    const hash = await hashPin(pinBuffer);
    const stored = localStorage.getItem('reflection_pin_hash');
    if (hash === stored) {
      // Success
      document.getElementById('lockScreen').style.display = 'none';
      showMainApp();
    } else {
      // Error
      document.querySelectorAll('.pin-dot').forEach(d => {
        d.classList.remove('filled');
        d.classList.add('error');
      });
      setTimeout(() => {
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
        pinBuffer = '';
      }, 500);
    }
  }
}

function pinClear() {
  pinBuffer = '';
  document.querySelectorAll('.pin-dot').forEach(d => {
    d.classList.remove('filled', 'error');
  });
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  document.querySelectorAll('.pin-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', i < pinBuffer.length);
  });
}

async function completeSetup() {
  try {
    const pin = document.getElementById('setupPin').value;
    const apiKey = document.getElementById('setupApiKey').value.trim();

    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
      toast('请输入 4 位数字密码', true);
      return;
    }
    if (!apiKey || apiKey.length < 10) {
      toast('请输入有效的 API Key', true);
      return;
    }

    const hash = await hashPin(pin);
    localStorage.setItem('reflection_pin_hash', hash);
    localStorage.setItem('reflection_api_key', apiKey);

    document.getElementById('setupScreen').style.display = 'none';
    showMainApp();
    toast('设置完成！');
  } catch (err) {
    toast('设置失败: ' + err.message, true);
  }
}

// ── Main App ──
function showMainApp() {
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('todayDate').textContent = getTodayDisplay();

  const textarea = document.getElementById('journalInput');
  textarea.addEventListener('input', () => {
    document.getElementById('charCount').textContent = textarea.value.length;
    document.getElementById('submitBtn').disabled = textarea.value.trim().length < 10;
  });
}

// ── AI Integration ──
async function submitReflection() {
  const input = document.getElementById('journalInput').value.trim();
  if (input.length < 10) return;

  const apiKey = localStorage.getItem('reflection_api_key');
  if (!apiKey) {
    toast('请先设置 API Key', true);
    return;
  }

  // Switch to processing state
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('inputFooter').style.display = 'none';
  document.getElementById('processingArea').style.display = 'flex';

  const todayStr = getToday();
  const todayDisplay = getTodayDisplay();

  // Check if we've already written today
  const lastWriteDate = localStorage.getItem('reflection_last_write_date');
  const isAppend = (lastWriteDate === todayStr);

  let systemPrompt;

  if (isAppend) {
    // ── APPEND MODE: only generate new sections ──
    systemPrompt = `你是 Zheng 的日记追加助手。他今天已经写过日记了，现在要追加新的内容。

## 最重要的规则

**严禁添加、扩写、或推断任何原文中没有的内容。** 你只能用他说过的话来组织内容。如果他只说了一句话，输出就应该只有一句话。宁可短，也不能多。

## 输出格式

只输出新的小节，不要输出 frontmatter（---date/title---），不要输出日期行。直接从 ## 小节标题开始。

例如：

## 小节标题

正文内容...

## 整理规则

1. **不要输出 frontmatter 和日期**，直接从 ## 开始
2. **小节**：根据内容分段，内容少就 1 个小节
3. **语言**：保持他本人的语言风格——中英混杂、口语化、真实
4. **忠实原文**：只整理结构和修正错别字，不改写、不润色、不扩写
5. **不要加任何他没说的内容**

只输出 markdown，不要加任何解释。`;
  } else {
    // ── NEW FILE MODE: full journal with frontmatter ──
    systemPrompt = `你是 Zheng 的日记整理助手。你的任务是把他用语音输入的原始内容整理成结构清晰的日记。

## 最重要的规则

**严禁添加、扩写、或推断任何原文中没有的内容。** 你只能用他说过的话来组织日记。如果他只说了两句话，日记就应该只有两句话的内容。不要为了让日记"看起来更完整"而编造任何细节、感受、或描述。宁可短，也不能多。

## 输出格式

你的输出必须是纯 markdown。frontmatter 中的日期必须严格使用下面给定的值，不要自己推算：

---
date: ${todayStr}
title: "简短标题，用顿号分隔几个关键词"
---

**${todayStr}，${todayDisplay}**

## 小节标题

正文...

## 整理规则

1. **日期**：必须使用上面给出的 date: ${todayStr}，显示日期用 ${todayDisplay}，不要自己编日期
2. **标题**：用顿号连接 2-3 个今天的关键词，风格参考："奶茶、新机会、和过一天算一天"
3. **小节**：根据内容自然分段，每段一个小标题。如果内容很少，1-2 个小节就够了，不要硬凑
4. **语言**：保持他本人的语言风格——中英混杂、口语化、真实。不要美化、不要鸡汤
5. **忠实原文**：只整理结构和修正语音输入的错别字，不改写、不润色、不扩写。他说"好激动"就写"好激动"，不要扩展成"感到非常激动和期待"
6. **不要加任何他没说的内容**：包括但不限于——不要加描述、不要加感受、不要加评论、不要加总结、不要加展望

只输出 markdown，不要加任何解释。`;
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: `以下是我今天用语音输入记录的内容，请帮我整理成日记：\n\n${input}`
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 错误 ${response.status}`);
    }

    const data = await response.json();
    currentMarkdown = data.content[0].text;

    // Filename is always date-based — no dependency on AI-generated title
    currentFilename = `${todayStr}.md`;

    if (isAppend) {
      // Append mode: prepend newlines for separation
      currentMarkdown = '\n\n' + currentMarkdown;
      const titleMatch = currentMarkdown.match(/title:\s*"(.+?)"/);
      currentTitle = titleMatch ? titleMatch[1] : '';
    } else {
      // New file mode: extract title from frontmatter
      const titleMatch = currentMarkdown.match(/title:\s*"(.+?)"/);
      currentTitle = titleMatch ? titleMatch[1] : '日记';
    }

    // Show preview
    showPreview();

  } catch (err) {
    toast(err.message, true);
    backToEdit();
  }
}

function showPreview() {
  document.getElementById('processingArea').style.display = 'none';
  document.getElementById('previewArea').style.display = 'flex';
  document.getElementById('previewFooter').classList.remove('hidden');
  document.getElementById('previewFilename').textContent = currentFilename;

  // Render markdown (simple conversion)
  const content = currentMarkdown
    // Remove frontmatter
    .replace(/^---[\s\S]*?---\n*/, '')
    // Bold date line
    .replace(/^\*\*(.+?)\*\*$/gm, '<p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">$1</p>')
    // Headers
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // Paragraphs
    .split('\n\n')
    .map(block => {
      if (block.startsWith('<h2>') || block.startsWith('<p style')) return block;
      if (block.trim() === '') return '';
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    })
    .join('');

  document.getElementById('previewContent').innerHTML = content;
}

function backToEdit() {
  document.getElementById('processingArea').style.display = 'none';
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('previewFooter').classList.add('hidden');
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('inputFooter').style.display = 'flex';
}

// ── File Save via Obsidian URL Scheme ──
function saveToObsidian() {
  const today = getToday();
  const year = today.slice(0, 4);
  const lastWriteDate = localStorage.getItem('reflection_last_write_date');
  const isAppend = (lastWriteDate === today);

  // File path within the vault (without .md — Obsidian adds it)
  const notePath = `entries/${year}/${today}`;

  // Build the Obsidian URL — always append (creates file if it doesn't exist)
  const obsidianUrl = `obsidian://new?vault=${encodeURIComponent('reflection-vault')}`
    + `&file=${encodeURIComponent(notePath)}`
    + `&content=${encodeURIComponent(currentMarkdown)}`
    + '&append=true';

  // Open Obsidian — it will create/append the file in the vault
  window.location.href = obsidianUrl;

  // Track that we've written today
  localStorage.setItem('reflection_last_write_date', today);

  setTimeout(() => showSuccess(), 800);
}

function showSuccess() {
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('previewFooter').classList.add('hidden');
  document.getElementById('successArea').classList.remove('hidden');
  document.getElementById('successArea').style.display = 'flex';
  document.getElementById('successFilename').textContent = currentFilename;
}

function resetAll() {
  document.getElementById('journalInput').value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('successArea').classList.add('hidden');
  document.getElementById('successArea').style.display = 'none';
  currentMarkdown = '';
  currentFilename = '';
  currentTitle = '';
  backToEdit();
}

// ── Settings ──
function showSettings() {
  document.getElementById('settingsApiKey').value = localStorage.getItem('reflection_api_key') || '';
  document.getElementById('settingsPin').value = '';
  document.getElementById('settingsModal').classList.add('show');
}

function hideSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

async function saveSettings() {
  const apiKey = document.getElementById('settingsApiKey').value.trim();
  const newPin = document.getElementById('settingsPin').value;

  if (apiKey) {
    localStorage.setItem('reflection_api_key', apiKey);
  }

  if (newPin) {
    if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
      toast('密码必须是 4 位数字', true);
      return;
    }
    const hash = await hashPin(newPin);
    localStorage.setItem('reflection_pin_hash', hash);
  }

  hideSettings();
  toast('设置已保存');
}

// ── PWA: Request persistent storage ──
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist().then(granted => {
    if (granted) console.log('Persistent storage granted');
  });
}

// ── Add to Home Screen prompt ──
function checkStandalone() {
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone && !localStorage.getItem('reflection_dismiss_pwa')) {
    setTimeout(() => {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const banner = document.createElement('div');
      banner.id = 'pwaBanner';
      banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:16px 20px;z-index:50;padding-bottom:calc(16px + var(--safe-bottom));';
      banner.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div style="font-size:14px;font-weight:500;color:var(--text);">Add to Home Screen</div>
          <button onclick="document.getElementById('pwaBanner').remove();localStorage.setItem('reflection_dismiss_pwa','1')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;">×</button>
        </div>
        <div style="font-size:13px;color:var(--text-dim);line-height:1.5;">
          ${isIOS
            ? 'To keep your API key saved, add this app to your home screen:<br>Tap <span style="font-size:16px;">⎋</span> (share button) at the bottom of Safari → <strong>Add to Home Screen</strong>'
            : 'To keep your API key saved, add this app to your home screen from your browser menu.'}
        </div>
      `;
      document.body.appendChild(banner);
    }, 2000);
  }
}

// ── Init ──
initApp();
checkStandalone();
</script>
